<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#000000" />
<title>Media City Studios AI projects &amp; tools</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #000000;
    --paper: #f5f6f0;        /* warm cream card surface */
    --cream: #eaece3;        /* pale sage signup surface */
    --lilac: #c3b3e7;        /* brand accent */
    --lilac-soft: #ede7f7;   /* tint for hovers/labels */
    --text: #000000;
    --text-muted: #5b5f63;
    --text-faint: #8a8f93;
    --border: #e2e2dd;
    --border-strong: #000000;
    --radius: 12px;
    --radius-sm: 10px;
    font-synthesis: none;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Helvetica Neue", Helvetica, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- MediaCity wordmark ---------- */
  .logo-svg { display: block; height: auto; }
  .logo-svg path { fill: currentColor; }

  /* ---------- Passphrase gate ---------- */
  #gate {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--ink);
    color: #ffffff;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #gate.hidden { display: none; }
  .gate-panel {
    width: 100%; max-width: 400px;
    text-align: center;
  }
  .gate-logo { color: #ffffff; margin: 0 auto 18px; }
  .gate-logo .logo-svg { width: 230px; margin: 0 auto; }
  .gate-sub {
    color: rgba(255,255,255,0.65); font-size: 12px; margin: 0 0 26px;
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  #gate input {
    width: 100%; padding: 13px 14px; font-size: 15px;
    background: transparent; color: #ffffff;
    border: 1px solid rgba(255,255,255,0.4); border-radius: var(--radius-sm);
    outline: none; margin-bottom: 12px;
  }
  #gate input::placeholder { color: rgba(255,255,255,0.5); }
  #gate input:focus { border-color: var(--lilac); }
  #gate button {
    width: 100%; padding: 13px 14px; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    background: #ffffff; color: var(--ink);
    border: 1px solid #ffffff; border-radius: var(--radius-sm); cursor: pointer;
  }
  #gate button:hover { background: var(--lilac); border-color: var(--lilac); }
  .gate-error {
    color: #ffb4a3; font-size: 13px; min-height: 18px; margin: 12px 0 0;
  }

  /* ---------- Layout ---------- */
  .wrap { max-width: 1180px; margin: 0 auto; padding: 30px 22px 40px; }
  header.site {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 14px;
    padding-bottom: 20px; margin-bottom: 22px;
    border-bottom: 2px solid var(--lilac);
  }
  .site-brand { color: var(--ink); display: flex; align-items: center; }
  .site-brand .logo-svg { width: 188px; }
  .lock-tag {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
  }
  .site-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  h1 {
    font-size: 26px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.4px;
  }
  .intro {
    color: var(--text-muted); font-size: 16px; margin: 0 0 26px; max-width: 760px;
  }

  /* ---------- Filter bar ---------- */
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
  .filter-btn {
    font-size: 12px; padding: 9px 18px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600;
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink); border-radius: 999px;
    transition: background .12s ease, color .12s ease;
  }
  .filter-btn:hover { background: var(--lilac-soft); }
  .filter-btn.active {
    background: var(--ink); color: #ffffff; border-color: var(--ink);
  }
  .filter-btn .count { opacity: 0.65; margin-left: 5px; font-size: 11px; }
  .filter-btn.active .count { opacity: 0.8; }

  /* ---------- Cards ---------- */
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
  }
  .card {
    background: var(--paper); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px;
    display: flex; flex-direction: column;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  .card:hover { border-color: var(--ink); box-shadow: 0 6px 22px rgba(0,0,0,0.06); }
  .card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; margin-bottom: 16px;
  }
  .card-name { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.2px; }
  .badge {
    font-size: 11px; font-weight: 700; white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 5px 12px; border-radius: 999px; border: 1px solid transparent;
  }
  /* Brand monochrome status badges */
  .badge.live { background: var(--ink);   color: #ffffff;   border-color: var(--ink); }
  .badge.dev  { background: var(--lilac);  color: var(--ink); border-color: var(--lilac); }
  .badge.done { background: var(--cream);  color: var(--ink); border-color: #d4d6cc; }
  .badge.platform { background: var(--lilac-soft); color: #4b3b73; border-color: var(--lilac); }
  .badge-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .field-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-faint); margin: 0 0 3px;
  }
  .field-text { font-size: 14.5px; color: var(--ink); margin: 0 0 16px; }
  .card-foot {
    margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 5px;
  }
  .notes { font-size: 13.5px; color: var(--text-muted); margin: 0; flex: 1; min-width: 200px; }
  .notes-label {
    color: var(--text-faint); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px; font-size: 11px;
  }
  .updated {
    font-size: 11px; color: var(--text-faint); white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.6px;
  }

  /* Collapsible technical description */
  details.tech { margin: 0 0 16px; }
  details.tech > summary {
    cursor: pointer; list-style: none; user-select: none;
    font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-faint); display: inline-flex; align-items: center; gap: 7px;
  }
  details.tech > summary::-webkit-details-marker { display: none; }
  details.tech > summary::before {
    content: "+"; display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%; line-height: 1;
    background: var(--lilac-soft); color: #4b3b73; font-weight: 700; font-size: 13px;
  }
  details.tech[open] > summary::before { content: "\2013"; }
  details.tech > summary:hover { color: var(--ink); }
  details.tech .field-text { margin: 8px 0 0; }

  /* Single page-level updated stamp */
  .page-updated {
    display: inline-block; margin: 0;
    background: var(--cream); color: var(--text-muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    padding: 5px 12px; border-radius: 999px;
  }

  .empty { color: var(--text-muted); padding: 48px 0; text-align: center; }

  /* ---------- Footer (brand black block) ---------- */
  footer.site {
    margin-top: 48px;
    background: var(--ink); color: rgba(255,255,255,0.8);
    text-align: center; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 26px 20px;
  }

  @media (max-width: 520px) {
    .wrap { padding: 22px 15px 32px; }
    .site-brand .logo-svg { width: 150px; }
    h1 { font-size: 22px; }
    .intro { font-size: 15px; }
  }
</style>
</head>

      <input type="password" id="gate-input" placeholder="Enter passphrase" aria-label="Passphrase" autofocus />

    </form>
  </div>

    <h1>AI projects &amp; tools</h1>
    <p class="intro">A live index of all AI projects and tools across Media City Studios.</p>

    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>No projects match this filter.</div>
  </div>
  <footer class="site" id="footer" hidden></footer>

<script>
(function () {
  "use strict";

  /* ---- Passphrase gate (soft gate; source is public by design) ---- */
  var PASSPHRASE = "mediacity";
  var STORE_KEY = "mediacity_projects_unlocked";
  var gate = document.getElementById("gate");
  var app = document.getElementById("app");
  var footerEl = document.getElementById("footer");

  function unlock() {
    gate.classList.add("hidden");
    app.hidden = false;
    footerEl.hidden = false;
    loadProjects();
  }

  try {
    if (localStorage.getItem(STORE_KEY) === "1") { unlock(); }
  } catch (e) { /* localStorage unavailable; gate stays */ }

  document.getElementById("gate-form").addEventListener("submit", function (ev) {
    ev.preventDefault();
    var val = document.getElementById("gate-input").value.trim();
    if (val === PASSPHRASE) {
      try { localStorage.setItem(STORE_KEY, "1"); } catch (e) {}
      unlock();
    } else {
      document.getElementById("gate-error").textContent = "Incorrect passphrase. Try again.";
      document.getElementById("gate-input").value = "";
      document.getElementById("gate-input").focus();
    }
  });

  /* ---- Project rendering ---- */
  var STATUSES = [
    { key: "all",            label: "All" },
    { key: "In Development", label: "In development" },
    { key: "Live",           label: "Live" }
  ];
  var BADGE = { "Live": "live", "In Development": "dev", "Complete": "done" };
  var ORDER = { "Live": 0, "In Development": 1, "Complete": 2 };

  var allProjects = [];
  var activeFilter = "all";

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function fmtDate(iso) {
    if (!iso) return "";
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return esc(iso);
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
  }

  function loadProjects() {
    fetch("projects.json", { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        allProjects = Array.isArray(data) ? data.slice() : [];
        allProjects.sort(function (a, b) {
          var oa = ORDER[a.status] == null ? 9 : ORDER[a.status];
          var ob = ORDER[b.status] == null ? 9 : ORDER[b.status];
          if (oa !== ob) return oa - ob;
          return String(a.name).localeCompare(String(b.name));
        });
        var latest = allProjects.reduce(function (m, p) {
          return (p.lastUpdated && p.lastUpdated > m) ? p.lastUpdated : m;
        }, "");
        var pu = document.getElementById("page-updated");
        if (pu) pu.textContent = latest ? ("Updated " + fmtDate(latest)) : "";
        renderFilters();
        render();
      })
      .catch(function (err) {
        document.getElementById("grid").innerHTML = "";
        var e = document.getElementById("empty");
        e.hidden = false;
        e.textContent = "Could not load projects.json (" + err.message + "). If you are viewing this file directly, serve it over http.";
      });
  }

  function countFor(key) {
    if (key === "all") return allProjects.length;
    return allProjects.filter(function (p) { return p.status === key; }).length;
  }

  function renderFilters() {
    var box = document.getElementById("filters");
    box.innerHTML = "";
    STATUSES.forEach(function (s) {
      var b = document.createElement("button");
      b.className = "filter-btn" + (s.key === activeFilter ? " active" : "");
      b.innerHTML = esc(s.label) + ' <span class="count">' + countFor(s.key) + "</span>";
      b.addEventListener("click", function () {
        activeFilter = s.key;
        renderFilters();
        render();
      });
      box.appendChild(b);
    });
  }

  function render() {
    var grid = document.getElementById("grid");
    var empty = document.getElementById("empty");
    var list = activeFilter === "all"
      ? allProjects
      : allProjects.filter(function (p) { return p.status === activeFilter; });

    grid.innerHTML = "";
    empty.hidden = list.length !== 0;

    list.forEach(function (p) {
      var cls = BADGE[p.status] || "dev";
      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="card-head">' +
          '<h2 class="card-name">' + esc(p.name) + '</h2>' +
          '<div class="badge-group">' +
            (p.platform ? '<span class="badge platform">' + esc(p.platform) + '</span>' : '') +
            '<span class="badge ' + cls + '">' + esc(p.status) + '</span>' +
          '</div>' +
        '</div>' +
        '<p class="field-text">' + esc(p.plainSummary) + '</p>' +
        '<details class="tech">' +
          '<summary>Technical description</summary>' +
          '<p class="field-text">' + esc(p.technicalSummary) + '</p>' +
        '</details>' +
        ((p.notes || p.next) ? '<div class="card-foot">' +
          (p.notes ? '<p class="notes"><span class="notes-label">Notes:</span> ' + esc(p.notes) + '</p>' : '') +
          (p.next ? '<p class="notes"><span class="notes-label">Next:</span> ' + esc(p.next) + '</p>' : '') +
        '</div>' : '');
      grid.appendChild(card);
    });

    document.getElementById("footer").textContent =
      allProjects.length + " project" + (allProjects.length === 1 ? "" : "s") + " · Media City Studios internal directory";
  }
})();
</script>
</body>
</html>
